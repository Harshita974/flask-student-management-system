<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Registered Students</h2>
        <a href="/add-student" class="btn">Add New Student</a>
        <br><br>
        <table border="1" style="width:100%; border-collapse: collapse;">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s['name'] }}</td>
                    <td>{{ s['email'] }}</td>
                    <td>{{ s['course'] }}</td>
                    <td>
                        <a href="/edit/{{ s['id'] }}">Edit</a> | 
                        <a href="/delete/{{ s['id'] }}" onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
