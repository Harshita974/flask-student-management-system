<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Admin User Management</h2>
        <p>Logged in as: {{ session['user'] }} (Admin)</p>
        
        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
            </tr>
            {% for user in users %}
            <tr>
                <td>{{ user['id'] }}</td>
                <td>{{ user['username'] }}</td>
                <td>{{ user['role'] }}</td>
            </tr>
            {% endfor %}
        </table>
        
        <br>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
